<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <g font-family="Segoe UI, Arial" font-size="12" fill="#222">
    <rect x="20" y="20" width="140" height="40" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="30" y="45">main.cpp</text>

    <rect x="220" y="20" width="140" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="230" y="45">Renderer</text>

    <rect x="420" y="20" width="140" height="40" rx="6" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="430" y="45">Scene / Entity</text>

    <rect x="620" y="20" width="140" height="40" rx="6" fill="#fff7ed" stroke="#ffedd5"/>
    <text x="630" y="45">Assets / Shaders</text>

    <line x1="160" y1="40" x2="220" y2="40" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="360" y1="40" x2="420" y2="40" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="40" x2="620" y2="40" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
      </marker>
    </defs>

    <text x="30" y="90" fill="#374151">`ApplicationUI.cpp` → ImGui-based UI</text>
    <text x="30" y="110" fill="#374151">`Shader.h` / `Material.h` → Rendering pipeline</text>
    <text x="30" y="130" fill="#374151">`Model.h`, `Mesh.h` → Asset loading</text>
  </g>
</svg>
